<svg width="1600" height="1080" viewBox="0 0 900 608" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Xyndicate Protocol v2 — Architecture</title>
<desc>Six-agent pipeline on X Layer: dual data sources feed Oracle, which drives Analyst through Narrator. Four contracts record decisions, vault PnL, manage seasons, and enforce x402 licensing. Economy loop runs earn-pay-earn autonomously. Squad Registry admits user-deployed squads. MCP skill exposes five tools to the wider agent ecosystem. Seven-page frontend at xyndicateprotocol.vercel.app.</desc>

